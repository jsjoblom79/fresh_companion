<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/styles.css">

    <title>Fresh Companion</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DATA MANAGEMENT</h1>
            <div class="header-subtitle">COPYRIGHT (C) 2026 RETRO DESIGN SYSTEMS.</div>
        </div>
        <div class="button-group">
            <button onclick="window.pywebview.api.close_app()">
            EXIT</button>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-box">
                <h2>SYSTEM INFO</h2>
            </div>
            <div class="dashboard-box">
                <h2>FOLLOW UP</h2>
            </div>
        </div>
        <div class="form-section">
            <h3>TASK ENTRY</h3>
        </div>
        <div class="form-section">
            <h3>ALL TASKS</h3>
            <div id="all-tasks">

            </div>
        </div>
        <div class="status-bar">
            <span></span>
            <span class="status-time">1.0.0</span>
            <span></span>
        </div>
    </div>
<div class="scanlines"></div>
<script src="js/scripts.js"></script>
</body>
</html>
